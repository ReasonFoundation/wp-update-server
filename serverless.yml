service: wp-update-server

bref:
  team: reason

provider:
  name: aws
  region: us-east-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::${env:S3_BUCKET}
            - arn:aws:s3:::${env:S3_BUCKET}/*

functions:
  web:
    # `index.php` is the entrypoint of your application
    handler: index.php
    runtime: php-84-fpm
    timeout: 28 # in seconds (API Gateway has a max timeout of 29 seconds)
    environment:
      S3_BUCKET: !Ref WPUpdateBucket
      S3_PREFIX: ${env:S3_PREFIX, ''}
    events:
      - httpApi: '*'

resources:
  Resources:
    WPUpdateBucket:
      Type: AWS::S3::Bucket
    # IAM policy that makes the bucket publicly readable
    WPUpdateBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref WPUpdateBucket
        PolicyDocument:
          Statement:
            -   Effect: Allow
                Principal: '*' # everyone
                Action: s3:GetObject
                Resource: !Sub '${WPUpdateBucket.Arn}/*'

plugins:
  - ./vendor/bref/bref